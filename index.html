<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuada Boy Evo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #333330;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Corpo do Game Boy Classic (Cor Cinza-Claro DMG-01) */
        .gameboy {
            background-color: #C5C6C0;
            width: 380px;
            height: 680px;
            border-radius: 10px 10px 60px 10px;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.5), inset -5px -5px 10px rgba(0,0,0,0.2), inset 5px 5px 10px rgba(255,255,255,0.4);
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* Linhas decorativas do topo */
        .topo-decoracao {
            width: 100%;
            text-align: center;
            color: #8b0000;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        /* Moldura da Tela (Cinza Escuro com as listras azul e vermelha clássicas) */
        .moldura-tela {
            background-color: #777874;
            width: 100%;
            height: 280px;
            border-radius: 10px 10px 40px 10px;
            padding: 25px 35px;
            box-shadow: inset 3px 3px 5px rgba(0,0,0,0.4);
            border-top: 3px solid #8b1d40;
            border-bottom: 3px solid #2b3a67;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            color: #9da199;
            font-size: 10px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        /* TELA VERDE DO GAME BOY (Onde o problema foi corrigido) */
        .tela-verde {
            background-color: #8b956d; /* Tom esverdeado clássico LCD */
            flex-grow: 1;
            border: 3px solid #575e46;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.3);
            padding: 12px;
            color: #0f1c04;
            font-weight: bold;
            
            /* SOLUÇÃO DO SEU PROBLEMA: Limita o texto e cria rolagem se necessário */
            overflow-y: auto; 
            max-height: 215px; 
        }

        /* Estilização da barra de rolagem interna para ficar retrô */
        .tela-verde::-webkit-scrollbar {
            width: 6px;
        }
        .tela-verde::-webkit-scrollbar-thumb {
            background-color: #575e46;
            border-radius: 3px;
        }

        .pergunta-texto {
            font-size: 18px;
            line-height: 1.4;
            text-align: justify;
            word-wrap: break-word;
        }

        /* ÁREA DOS CONTROLES */
        .painel-controles {
            width: 100%;
            flex-grow: 1;
            position: relative;
        }

        /* Direcional D-Pad (Plástico Cinza-Escuro) */
        .dpad {
            position: absolute;
            left: 10px;
            top: 20px;
            width: 90px;
            height: 90px;
        }

        .dpad-eixo {
            background-color: #2D2D2D;
            position: absolute;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        .dpad-vertical {
            width: 30px;
            height: 90px;
            left: 30px;
            border-radius: 4px;
        }

        .dpad-horizontal {
            width: 90px;
            height: 30px;
            top: 30px;
            border-radius: 4px;
        }

        .dpad-centro {
            width: 30px;
            height: 30px;
            top: 30px;
            left: 30px;
            background-color: #2D2D2D;
            position: absolute;
            z-index: 2;
        }

        /* Botões de Ação A e B (Roxo/Púrpura Escuro Clássico) */
        .botoes-acao {
            position: absolute;
            right: 0px;
            top: 25px;
            background-color: #b5b7b0; /* Rebaixo sutil onde os botões ficam */
            width: 140px;
            height: 70px;
            border-radius: 35px;
            transform: rotate(-28deg);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2);
        }

        .btn-circular {
            width: 45px;
            height: 45px;
            background-color: #8A1B3C; /* Roxo/Bordô histórico */
            border-radius: 50%;
            border: none;
            box-shadow: 2px 4px 5px rgba(0,0,0,0.4), inset -2px -2px 4px rgba(0,0,0,0.4);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgba(255,255,255,0.2);
            font-weight: bold;
            transform: rotate(28deg); /* Desfaz a rotação para o texto ficar reto */
        }

        .btn-circular:active {
            box-shadow: 1px 1px 2px rgba(0,0,0,0.4);
            transform: rotate(28deg) translateY(2px);
        }

        /* Botões de Menu (Start e Select em plástico Cinza-Escuro) */
        .botoes-menu {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 25px;
        }

        .menu-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn-pílula {
            width: 55px;
            height: 12px;
            background-color: #5d5e5a; /* Plástico cinza escuro */
            border-radius: 6px;
            transform: rotate(-28deg);
            box-shadow: 1px 2px 3px rgba(0,0,0,0.4), inset -1px -1px 2px rgba(0,0,0,0.4);
            border: none;
            cursor: pointer;
        }

        .menu-rotulo {
            font-size: 10px;
            font-weight: bold;
            color: #2b3a67;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <!-- Estrutura Principal do Console -->
    <div class="gameboy">
        <div class="topo-decoracao">● TABUADA BOY • EVO</div>
        
        <!-- Área da Tela Isolada -->
        <div class="moldura-tela">
            <div class="status-bar">
                <span>QUIZ CRT SP</span>
                <span>PTS 0</span>
            </div>
            
            <!-- A Tela Verde com a correção de overflow -->
            <div class="tela-verde">
                <p class="pergunta-texto">
                    A autotutela administrativa é o poder que a Administração Pública possui de anular seus próprios atos quando eivados de ilegalidades, ou de revogá-los por motivos de conveniência e oportunidade.
                </p>
            </div>
        </div>

        <!-- Área dos Controles Separada (Impossível o texto invadir aqui agora) -->
        <div class="painel-controles">
            
            <!-- Direcional D-Pad -->
            <div class="dpad">
                <div class="dpad-eixo dpad-vertical"></div>
                <div class="dpad-eixo dpad-horizontal"></div>
                <div class="dpad-centro"></div>
            </div>

            <!-- Botões de Ação A e B -->
            <div class="botoes-acao">
                <button class="btn-circular">B</button>
                <button class="btn-circular">A</button>
            </div>

            <!-- Botões Select e Start -->
            <div class="botoes-menu">
                <div class="menu-wrapper">
                    <button class="btn-pílula"></button>
                    <span class="menu-rotulo">SELECT</span>
                </div>
                <div class="menu-wrapper">
                    <button class="btn-pílula"></button>
                    <span class="menu-rotulo">START</span>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
